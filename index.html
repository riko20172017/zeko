<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link href="./css/bootstrap.min.css" rel="stylesheet">
  <link rel="stylesheet" href="./css/swiper.min.css">
  <link href="./css/style.css" rel="stylesheet">
  <link
    href="https://fonts.googleapis.com/css2?family=Cinzel:wght@500;700&family=Cormorant+Garamond:wght@400;600;700&family=Merriweather:wght@300;400&display=swap"
    rel="stylesheet">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link
    href="https://fonts.googleapis.com/css2?family=Source+Serif+4:ital,opsz,wght@0,8..60,200..900;1,8..60,200..900&display=swap"
    rel="stylesheet">

  <title>Document</title>
</head>

<body>
  <div class="container">
    <div class="row">
      <div class="col">
        <img class="img-fluid" src="./img/hero.png" alt="" srcset="">
        <div class="hero-img"></div>
      </div>


    </div>
    <!-- Content here -->
  </div>

  <div class="container text-center p-5">
    <div class="row row-cols-5">
      <div class="col-12">
        <div class="d-flex">
          <div class="service-button-continer">
            <img class="img-fluid" src="./img/service_button_terrir.jpg" alt="" srcset="">
          </div>
          <div class="service-button-continer">
            <img class="img-fluid" src="./img/service_button_bilet.jpg" alt="" srcset="">
          </div>
          <div class="service-button-continer">
            <img class="img-fluid" src="./img/service_button_ekskurs.jpg" alt="" srcset="">
          </div>
          <div class="service-button-continer">
            <img class="img-fluid" src="./img/service_button_transfer.jpg" alt="" srcset="">
          </div>
          <div class="service-button-continer">
            <img class="img-fluid" src="./img/service_button_vidi.jpg" alt="" srcset="">
          </div>
        </div>
        <div class="d-flex">
          <div class="service-button-continer">
            <img class="img-fluid" src="./img/service_button_turi.jpg" alt="" srcset="">
          </div>
          <div class="service-button-continer">
            <img class="img-fluid" src="./img/service_button_uzor.jpg" alt="" srcset="">
          </div>
          <div class="service-button-continer">
            <img class="img-fluid" src="./img/service_button_kontakt.jpg" alt="" srcset="">
          </div>
        </div>
      </div>
    </div>
  </div>
  <div class="container text-center p-5">
    <div class="">
      <div class=""></div>
      <!-- Slider main container -->
      <div class="swiper">
        <!-- Additional required wrapper -->
        <div class="swiper-wrapper">
          <!-- Slides -->
          <div class="swiper-slide">
            <div class="test">
              <img class="img-fluid" src="./img/territor_1.jpg" alt="" srcset="">
              <div class="service-text-container">
                <span class="service-text-ornament service-text-ornament--top-left" aria-hidden="true"></span>
                <span class="service-text-ornament service-text-ornament--top-right" aria-hidden="true"></span>
                <span class="service-text-ornament service-text-ornament--bottom-left" aria-hidden="true"></span>
                <span class="service-text-ornament service-text-ornament--bottom-right" aria-hidden="true"></span>
                <h3 class="service-title-text">КБР</h3>
                <span class="service-description-text">Кабардино-Балкария - регион Приэльбрусья, Чегемских водопадов,
                  Голубых озер</span>
              </div>
            </div>
          </div>
          <div class="swiper-slide"><img class="img-fluid" src="./img/terrritor_2.jpg" alt="" srcset=""></div>
          <div class="swiper-slide"><img class="img-fluid" src="./img/terrritor_3.jpg" alt="" srcset=""></div>
          <div class="swiper-slide"><img class="img-fluid" src="./img/terrritor_4.jpg" alt="" srcset=""></div>
          <div class="swiper-slide"><img class="img-fluid" src="./img/terrritor_5.jpg" alt="" srcset=""></div>
          <div class="swiper-slide"><img class="img-fluid" src="./img/terrritor_6.jpg" alt="" srcset=""></div>
        </div>
        <!-- If we need pagination -->
        <div class="swiper-pagination"></div>

        <!-- If we need navigation buttons -->
        <div class="swiper-button-prev"></div>
        <div class="swiper-button-next"></div>

        <!-- If we need scrollbar -->
        <div class="swiper-scrollbar"></div>
      </div>
    </div>
  </div>
  <script src="./js/swiper.min.js"></script>
  <script src="./js/index.js"></script>
</body>

</html>
